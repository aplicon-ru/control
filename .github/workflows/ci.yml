name: CI

# lint/test/build run on every PR and on main (spec §17.3). Image publish
# is gated on a Dockerfile existing — internal/* isn't implemented yet, so
# there's nothing meaningful to containerize until that lands. Written
# directly in this repo per spec §17.9 (first repo in the ecosystem); pull
# the shared steps into a reusable workflow once a second product repo
# needs the same pipeline.

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  GO_VERSION: "1.23"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - uses: golangci/golangci-lint-action@v6
        with:
          version: latest

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - run: go test ./... -coverprofile=coverage.out -covermode=atomic
      - uses: codecov/codecov-action@v4
        with:
          files: ./coverage.out
          fail_ci_if_error: false

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - run: go build ./...

  publish-edge:
    needs: [lint, test, build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - id: has-dockerfile
        run: echo "exists=${{ hashFiles('Dockerfile') != '' }}" >> "$GITHUB_OUTPUT"
      - if: steps.has-dockerfile.outputs.exists == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - if: steps.has-dockerfile.outputs.exists == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ghcr.io/aplicon-ru/control:edge

  release:
    needs: [lint, test, build]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v4
      - id: has-dockerfile
        run: echo "exists=${{ hashFiles('Dockerfile') != '' }}" >> "$GITHUB_OUTPUT"
      - if: steps.has-dockerfile.outputs.exists == 'true'
        uses: docker/setup-qemu-action@v3
      - if: steps.has-dockerfile.outputs.exists == 'true'
        uses: docker/setup-buildx-action@v3
      - if: steps.has-dockerfile.outputs.exists == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - if: steps.has-dockerfile.outputs.exists == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ghcr.io/aplicon-ru/control:${{ github.ref_name }}
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
